services:
  sqlserver:
    # Download Microsoft's official SQL Server image
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: spotify-sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "SpotifyAppPassword!"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data: